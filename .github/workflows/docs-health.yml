name: Docs health check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  prose-pages:
    runs-on: ubuntu-latest
    steps:
      - name: Verify key prose pages on docs.heydollr.app
        run: |
          set -euo pipefail
          BASE="https://docs.heydollr.app"
          paths=(
            "/"
            "/quickstart"
            "/authentication"
            "/api-conventions"
            "/guides/choose-integration"
            "/guides/collect-with-nodejs"
            "/guides/collect-with-python"
            "/guides/collect-with-php"
            "/guides/collect-with-nextjs"
            "/guides/collect-with-laravel"
            "/guides/collect-via-checkout"
            "/guides/integration"
            "/guides/realtime-status"
            "/guides/error-handling"
            "/concepts/sessions-and-executions"
            "/concepts/parties-and-counterparties"
            "/reference/payments-by-market"
            "/reference/error-catalog"
            "/reference/examples"
            "/reference/status-and-incidents"
            "/api/parties"
            "/api/executions"
          )
          failed=0
          for path in "${paths[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 "${BASE}${path}")
            if [ "$code" != "200" ]; then
              echo "::error::HTTP ${code} for ${BASE}${path}"
              failed=1
            else
              echo "OK ${path}"
            fi
          done
          for path in /docs/index /docs/quickstart /docs/guides/choose-integration; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 20 "${BASE}${path}")
            if [ "$code" != "200" ]; then
              echo "::error::Legacy redirect failed HTTP ${code} for ${BASE}${path}"
              failed=1
            else
              echo "OK legacy ${path}"
            fi
          done
          exit "$failed"

      - name: Verify prose URLs appear in sitemap
        run: |
          set -euo pipefail
          SITEMAP=$(curl -sL --max-time 20 "https://docs.heydollr.app/sitemap.xml")
          for slug in quickstart authentication guides/collect-with-nodejs reference/examples; do
            if ! echo "$SITEMAP" | grep -q "$slug"; then
              echo "::warning::sitemap.xml may be missing ${slug} (redeploy Mintlify after merge)"
            else
              echo "sitemap contains ${slug}"
            fi
          done
